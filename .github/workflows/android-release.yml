name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version-check.outputs.changed }}
      version_name: ${{ steps.version-check.outputs.version_name }}
    steps:
      - name: 拉取代码 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 版本检测 Version Check
        id: version-check
        run: |
          CUR_V_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          CUR_V_CODE=$(grep "versionCode =" app/build.gradle.kts | sed 's/.*= //')
          echo "当前版本 Current: $CUR_V_NAME ($CUR_V_CODE)"
          
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV_CONTENT=$(git show HEAD~1:app/build.gradle.kts)
            PREV_V_NAME=$(echo "$PREV_CONTENT" | grep "versionName =" | sed 's/.*"\(.*\)".*/\1/')
            PREV_V_CODE=$(echo "$PREV_CONTENT" | grep "versionCode =" | sed 's/.*= //')
            echo "前一版本 Previous: $PREV_V_NAME ($PREV_V_CODE)"
          else
            echo "没有找到历史版本，视为首次发布。"
            PREV_V_NAME=""
            PREV_V_CODE=""
          fi
          
          if [ "$CUR_V_NAME" != "$PREV_V_NAME" ] || [ "$CUR_V_CODE" != "$PREV_V_CODE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version_name=$CUR_V_NAME" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码 Checkout
        uses: actions/checkout@v4

      - name: 配置 JDK Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'
          cache: 'gradle'

      - name: 授权脚本 Grant Permission
        run: chmod +x gradlew

      - name: 编译打包 Build APK
        run: ./gradlew assembleRelease

      - name: 签名 APK Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 生成发布描述 Generate Release Body
        id: release_body
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "更新内容：" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B | grep -v '^[[:space:]]*$' | awk '{print NR "、" $0}' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 发布 Release Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version_name }}
          name: hyperlyric v${{ needs.check-version.outputs.version_name }}
          body: ${{ steps.release_body.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}